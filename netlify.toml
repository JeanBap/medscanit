[build]
  publish = "."
  command = "node scripts/generate-sitemap.js"

[[redirects]]
  from = "/blog/*"
  to = "/post.html"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
